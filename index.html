<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2e3347;
  --text: #e8eaf0; --text-muted: #8891a8;
  --primary: #4f6ef7; --primary-dark: #3d5ce3;
  --red: #ef4444; --font: 'Inter', sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }

.login-wrap {
  width: 100%; max-width: 400px;
}

.login-logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo-mark {
  width: 60px; height: 60px;
  background: var(--primary);
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(79,110,247,0.3);
}

.login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text-muted); }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
}

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
.form-control {
  width: 100%; background: #0f1117; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 14px;
  color: var(--text); font-family: var(--font); outline: none; transition: border-color 0.15s;
}
.form-control:focus { border-color: var(--primary); }
.form-control::placeholder { color: var(--text-muted); }

.btn-login {
  width: 100%; background: var(--primary); color: #fff;
  border: none; border-radius: 8px; padding: 11px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: background 0.15s;
  margin-top: 8px;
}
.btn-login:hover { background: var(--primary-dark); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--red);
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }

.divider { text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 12px; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
.divider::before { left: 0; }
.divider::after { right: 0; }

.btn-google {
  width: 100%; background: transparent; color: var(--text);
  border: 1px solid var(--border); border-radius: 8px; padding: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.15s;
}
.btn-google:hover { background: #22263a; }

.datum-credit { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-mark" style="font-size:22px;border-radius:12px"></div>
    <div class="login-title">APEX Performance</div>
    <div class="login-sub">Estruturas Metálicas · Sistema de Desempenho</div>
  </div>

  <div class="login-card">
    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-control" id="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">Entrar</button>

    <div class="divider">ou</div>

    <button class="btn-google" onclick="loginGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
  </div>

  <div class="datum-credit">Developed by Datum Studio · APEX v1.0</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
auth.onAuthStateChanged(user => {
  if (user) {
    db.collection('users').doc(user.uid).get().then(doc => {
      if (doc.exists) window.location.href = 'dashboard.html';
    });
  }
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(loading) {
  const btn = document.getElementById('btnLogin');
  btn.disabled = loading;
  btn.textContent = loading ? 'Entrando...' : 'Entrar';
}

function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showError('Preencha e-mail e senha.'); return; }
  setLoading(true);
  auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = 'dashboard.html')
    .catch(err => {
      setLoading(false);
      const msgs = {
        'auth/user-not-found': 'Usuário não encontrado.',
        'auth/wrong-password': 'Senha incorreta.',
        'auth/invalid-email': 'E-mail inválido.',
        'auth/too-many-requests': 'Muitas tentativas. Tente novamente em alguns minutos.',
      };
      showError(msgs[err.code] || 'Erro ao entrar. Tente novamente.');
    });
}

function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(result => {
    const user = result.user;
    return db.collection('users').doc(user.uid).get().then(doc => {
      if (!doc.exists) {
        return db.collection('users').doc(user.uid).set({
          name: user.displayName || user.email,
          email: user.email,
          role: 'employee',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }).then(() => window.location.href = 'dashboard.html');
  }).catch(err => showError('Erro ao entrar com Google.'));
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
