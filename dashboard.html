<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar overlay mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="12,2 22,20 2,20"/></svg></div>
      <div>
        <div class="logo-text" style="letter-spacing:2px">APEX</div>
        <div class="logo-sub" style="letter-spacing:1px;text-transform:uppercase">Estruturas Metálicas</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- preenchido via JS baseado no role -->
    </nav>

    <div class="sidebar-footer">
      <div class="user-pill" onclick="logout()">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">Carregando...</div>
          <div class="user-role" id="userRole">–</div>
        </div>
        <span style="color:var(--text-muted);font-size:12px;">↩</span>
      </div>
    </div>
  </aside>

  <!-- Conteúdo principal -->
  <div class="main-content">
    <div class="top-bar">
      <button class="hamburger" onclick="toggleSidebar()"></button>
      <span class="page-title" id="pageTitle">Dashboard</span>
      <div id="cycleInfo" style="font-size:12px;color:var(--text-muted);"></div>
    </div>

    <div class="page-content" id="pageContent">
      <div class="loading"><div class="spinner"></div> Carregando...</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Modal genérico -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

// ============================================================
// NAVEGAÇÃO
// ============================================================
let currentUser = null;
let currentCycle = null;
let currentPage = 'dashboard';

const ROLE_LABELS = { admin: 'Administrador', leader: 'Líder', captain: 'Capitão', employee: 'Colaborador' };

function getNavItems(role) {
  const all = [
    { id: 'dashboard',    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,  label: 'Dashboard',          roles: ['admin', 'leader', 'captain'] },
    { id: 'meu-painel',   icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,       label: 'Meu Painel',         roles: ['employee', 'captain', 'leader', 'admin'] },
    { id: 'avaliar',      icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 12 2 2 4-4"/></svg>`,  label: 'Avaliar Agora',      roles: ['leader', 'captain', 'admin'], section: 'Avaliações' },
    { id: 'avaliacoes',   icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,       label: 'Avaliações do Mês',  roles: ['leader', 'captain', 'admin'] },
    { id: 'placar',       icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,     label: 'Placar Geral',       roles: ['leader', 'captain', 'admin'] },
    { id: 'colaboradores',icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,      label: 'Colaboradores',      roles: ['admin'], section: 'Gestão' },
    { id: 'faturamento',  icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,     label: 'Faturamento',        roles: ['admin'] },
    { id: 'ciclos',       icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,   label: 'Histórico de Ciclos',roles: ['admin'] },
    { id: 'usuarios',     icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,       label: 'Usuários',           roles: ['admin'] },
    { id: 'configuracoes',icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,   label: 'Configurações',      roles: ['admin'], section: 'Sistema' },
  ];
  return all.filter(item => item.roles.includes(role));
}

function buildSidebar(role) {
  const items = getNavItems(role);
  let html = '';
  let lastSection = null;
  items.forEach(item => {
    if (item.section && item.section !== lastSection) {
      html += `<div class="nav-section">${item.section}</div>`;
      lastSection = item.section;
    }
    html += `<button class="nav-item" id="nav-${item.id}" onclick="navigate('${item.id}')">
      <span class="nav-icon">${item.icon}</span>${item.label}
    </button>`;
  });
  document.getElementById('sidebarNav').innerHTML = html;
}

function setActiveNav(pageId) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`nav-${pageId}`);
  if (el) el.classList.add('active');
}

function navigate(pageId) {
  currentPage = pageId;
  setActiveNav(pageId);
  closeSidebar();
  renderPage(pageId);
}

// ============================================================
// INICIALIZAÇÃO
// ============================================================
requireAuth(user => {
  currentUser = user;
  document.getElementById('userAvatar').textContent = (user.name || user.email || '?')[0].toUpperCase();
  document.getElementById('userName').textContent = user.name || user.email || 'Usuário';
  document.getElementById('userRole').textContent = ROLE_LABELS[user.role] || user.role;
  buildSidebar(user.role);

  getOrCreateCurrentCycle().then(cycle => {
    currentCycle = cycle;
    document.getElementById('cycleInfo').textContent = `${getMonthName(cycle.month)}/${cycle.year}`;

    // redirecionar colaborador direto para o painel
    if (user.role === 'employee') {
      navigate('meu-painel');
    } else {
      navigate('dashboard');
    }
  });
});

function logout() {
  auth.signOut().then(() => window.location.href = 'index.html');
}

// ============================================================
// ROTEAMENTO DE PÁGINAS
// ============================================================
function renderPage(pageId) {
  const titles = {
    dashboard: 'Dashboard', 'meu-painel': 'Meu Painel', avaliar: 'Avaliar Agora',
    avaliacoes: 'Avaliações do Mês', placar: 'Placar Geral',
    colaboradores: 'Colaboradores', faturamento: 'Faturamento',
    ciclos: 'Histórico de Ciclos', usuarios: 'Usuários', configuracoes: 'Configurações'
  };
  document.getElementById('pageTitle').textContent = titles[pageId] || pageId;
  const content = document.getElementById('pageContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  const pages = {
    dashboard: renderDashboard,
    'meu-painel': renderMeuPainel,
    avaliar: renderAvaliar,
    avaliacoes: renderAvaliacoes,
    placar: renderPlacar,
    colaboradores: renderColaboradores,
    faturamento: renderFaturamento,
    ciclos: renderCiclos,
    usuarios: renderUsuarios,
    configuracoes: renderConfiguracoes,
  };
  if (pages[pageId]) pages[pageId]();
}

// ============================================================
// DASHBOARD ADMIN/LÍDER
// ============================================================
async function renderDashboard() {
  const cycle = currentCycle;
  const [empSnap, evalSnap, revSnap, flagSnap] = await Promise.all([
    db.collection('employees').where('status', '==', 'active').get(),
    db.collection('evaluations').where('cycleId', '==', cycle.id).get(),
    db.collection('revenues').where('cycleId', '==', cycle.id).get(),
    db.collection('flags').orderBy('level').get(),
  ]);

  const employees = empSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const evaluations = evalSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const revenues = revSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.revenueDate || '').localeCompare(a.revenueDate || ''));
  const flags = flagSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(f => f.isActive !== false).sort((a, b) => a.level - b.level);

  // Calcular médias por colaborador
  const avgMap = {};
  evaluations.forEach(ev => {
    if (!avgMap[ev.employeeId]) avgMap[ev.employeeId] = { scores: [], lateCount: 0 };
    avgMap[ev.employeeId].scores.push(ev.totalScore);
    avgMap[ev.employeeId].lateCount = Math.max(avgMap[ev.employeeId].lateCount, ev.lateCount || 0);
  });

  const totalRevenue = revenues.reduce((s, r) => s + (r.amount || 0), 0);
  const currentFlag = flags.filter(f => f.isActive && f.minRevenue <= totalRevenue).sort((a, b) => b.minRevenue - a.minRevenue)[0];
  const nextFlag = flags.filter(f => f.isActive && f.minRevenue > totalRevenue).sort((a, b) => a.minRevenue - b.minRevenue)[0];

  const evaluated = employees.filter(e => avgMap[e.id]);
  const pending = employees.filter(e => !avgMap[e.id]);
  const berlinda = evaluated.filter(e => {
    const avg = avgMap[e.id]?.scores.reduce((a, b) => a + b, 0) / avgMap[e.id]?.scores.length;
    return avg < 50;
  });
  const withLates = evaluated.filter(e => (avgMap[e.id]?.lateCount || 0) >= 2);

  const isAdmin = currentUser.role === 'admin';

  document.getElementById('pageContent').innerHTML = `
    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">Avaliados</div>
        <div class="stat-value" style="color:var(--green)">${evaluated.length}</div>
        <div class="stat-sub">de ${employees.length} colaboradores</div>
        <div class="progress-bar" style="margin-top:10px">
          <div class="progress-fill" style="width:${employees.length ? (evaluated.length/employees.length*100) : 0}%;background:var(--green)"></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">Sem Avaliação</div>
        <div class="stat-value" style="color:var(--yellow)">${pending.length}</div>
        <div class="stat-sub">precisam ser avaliados</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">2+ Atrasos</div>
        <div class="stat-value" style="color:var(--yellow)">${withLates.length}</div>
        <div class="stat-sub">risco de perder premiação</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">Em Berlinda</div>
        <div class="stat-value" style="color:var(--red)">${berlinda.length}</div>
        <div class="stat-sub">nota abaixo de 50</div>
      </div>
    </div>

    <!-- Bandeira + Faturamento -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title"> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> Status da Bandeira</div>
            <div class="card-subtitle">${getMonthName(cycle.month)}/${cycle.year}</div>
          </div>
          ${isAdmin ? `<button class="btn btn-primary btn-sm" onclick="navigate('faturamento')"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Lançar</button>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          ${currentFlag
            ? `<div class="flag-circle flag-${currentFlag.level}">${currentFlag.level}</div>
               <div>
                 <div style="font-size:18px;font-weight:700">Bandeira ${currentFlag.level}</div>
                 <div style="color:var(--text-muted);font-size:13px">${currentFlag.bonusPercentage}% de premiação</div>
               </div>`
            : `<div class="flag-circle" style="background:#374151">0</div>
               <div style="color:var(--text-muted)">Nenhuma bandeira atingida</div>`
          }
        </div>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text-muted)">Faturamento do mês</div>
          <div style="font-size:22px;font-weight:700">${formatCurrency(totalRevenue)}</div>
          ${nextFlag ? `<div style="font-size:12px;color:var(--yellow);margin-top:4px">Faltam ${formatCurrency(nextFlag.minRevenue - totalRevenue)} para Bandeira ${nextFlag.level}</div>` : ''}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title"> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Aguardando Avaliação</div>
          <button class="btn btn-primary btn-sm" onclick="navigate('avaliar')">Avaliar</button>
        </div>
        ${pending.length === 0
          ? `<div class="empty-state"><div class="empty-icon"></div><div class="empty-text">Todos avaliados!</div></div>`
          : `<div style="display:flex;flex-direction:column;gap:8px">
              ${pending.slice(0, 5).map(emp => `
                <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border-radius:8px;cursor:pointer" onclick="navigate('avaliar')">
                  <div class="level-badge level-${emp.level}">${emp.level}</div>
                  <div style="flex:1">
                    <div style="font-weight:500;font-size:13px">${emp.name}</div>
                    <div style="font-size:11px;color:var(--text-muted)">${emp.position || 'Colaborador'}</div>
                  </div>
                  <span style="color:var(--text-muted)">→</span>
                </div>`).join('')}
              ${pending.length > 5 ? `<div style="text-align:center;font-size:12px;color:var(--text-muted)">+${pending.length - 5} mais</div>` : ''}
            </div>`
        }
      </div>
    </div>

    <!-- Ações rápidas -->
    <div class="card">
      <div class="card-title" style="margin-bottom:12px"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> Ações Rápidas</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-primary" onclick="navigate('avaliar')"> Avaliar Colaborador</button>
        <button class="btn btn-ghost" onclick="navigate('avaliacoes')"> Ver Avaliações</button>
        <button class="btn btn-ghost" onclick="navigate('placar')"> Placar Geral</button>
        ${isAdmin ? `<button class="btn btn-ghost" onclick="navigate('colaboradores')"> Colaboradores</button>` : ''}
        ${isAdmin ? `<button class="btn btn-ghost" onclick="navigate('faturamento')"> Faturamento</button>` : ''}
      </div>
    </div>
  `;
}

// ============================================================
// MEU PAINEL (colaborador)
// ============================================================
async function renderMeuPainel() {
  // Achar o employee vinculado ao user
  const empSnap = await db.collection('employees').where('userId', '==', currentUser.uid).get();
  if (empSnap.empty) {
    document.getElementById('pageContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"></div>
        <div class="empty-text">Seu usuário ainda não está vinculado a um colaborador.<br>Fale com o administrador.</div>
      </div>`;
    return;
  }
  const emp = { id: empSnap.docs[0].id, ...empSnap.docs[0].data() };
  const cycle = currentCycle;

  const [evalSnap, histSnap, flagSnap] = await Promise.all([
    db.collection('evaluations').where('cycleId', '==', cycle.id).where('employeeId', '==', emp.id).get(),
    db.collection('evaluations').where('employeeId', '==', emp.id).limit(12).get(),
    db.collection('flags').orderBy('level').get(),
  ]);

  const evals = evalSnap.docs.map(d => d.data());
  const history = histSnap.docs.map(d => d.data());
  const flags = flagSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(f => f.isActive !== false).sort((a, b) => a.level - b.level);

  const avgScore = evals.length ? Math.round(evals.reduce((s, e) => s + e.totalScore, 0) / evals.length) : null;
  const lateCount = evals.length ? Math.max(...evals.map(e => e.lateCount || 0)) : 0;
  const avgPunctuality = evals.length ? Math.round(evals.reduce((s, e) => s + (e.punctuality || 0), 0) / evals.length) : 0;
  const avgOrganization = evals.length ? Math.round(evals.reduce((s, e) => s + (e.organization || 0), 0) / evals.length) : 0;
  const avgProductivity = evals.length ? Math.round(evals.reduce((s, e) => s + (e.productivity || 0), 0) / evals.length) : 0;
  const avgQuality = evals.length ? Math.round(evals.reduce((s, e) => s + (e.quality || 0), 0) / evals.length) : 0;
  const avgSafety = evals.length ? Math.round(evals.reduce((s, e) => s + (e.safety || 0), 0) / evals.length) : 0;

  const status = getScoreLabel(avgScore, lateCount);
  const scoreColor = avgScore !== null ? getScoreColor(avgScore) : 'var(--text-muted)';

  const PROMO_REQS = { N1: { min: 70, next: 'N2' }, N2: { min: 75, next: 'N3' }, N3: { min: 80, next: 'N4' }, N4: { min: 85, next: 'N5' } };
  const req = PROMO_REQS[emp.level];
  const promoEligible = req && avgScore !== null && avgScore >= req.min;

  document.getElementById('pageContent').innerHTML = `
    <div style="display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start">
      <!-- Card principal -->
      <div>
        <div class="card" style="text-align:center;padding:28px 20px;margin-bottom:16px">
          <div class="level-badge level-${emp.level}" style="width:52px;height:52px;font-size:16px;margin:0 auto 12px">${emp.level}</div>

function updateSlider(id) {
  const val = document.getElementById(id).value;
  document.getElementById(id + 'Val').textContent = val;
  updateTotal();
}

function updateTotal() {
  const ids = ['punctuality', 'organization', 'productivity', 'quality', 'safety'];
  const total = ids.reduce((s, id) => {
    const el = document.getElementById(id);
    return s + (el ? parseInt(el.value) : 0);
  }, 0);
  const el = document.getElementById('totalScore');
  if (el) {
    el.textContent = total;
    el.style.color = getScoreColor(total);
  }
}

async function salvarAvaliacao() {
  const employeeId = document.getElementById('evalEmployee')?.value;
  if (!employeeId) { showToast('Selecione um colaborador.', 'error'); return; }

  const punctuality = parseInt(document.getElementById('punctuality').value);
  const organization = parseInt(document.getElementById('organization').value);
  const productivity = parseInt(document.getElementById('productivity').value);
  const quality = parseInt(document.getElementById('quality').value);
  const safety = parseInt(document.getElementById('safety').value);
  const totalScore = punctuality + organization + productivity + quality + safety;
  const lateCount = parseInt(document.getElementById('lateCount').value) || 0;
  const notes = document.getElementById('evalNotes').value.trim();

  try {
    await db.collection('evaluations').add({
      employeeId, cycleId: currentCycle.id,
      evaluatorId: currentUser.uid,
      punctuality, organization, productivity, quality, safety,
      totalScore, lateCount, notes,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    showToast('Avaliação salva com sucesso!');
    navigate('avaliacoes');
  } catch (e) {
    showToast('Erro ao salvar avaliação.', 'error');
  }
}

// AVALIAÇÕES DO MÊS
// ============================================================
async function renderAvaliacoes() {
  const [empSnap, evalSnap] = await Promise.all([
    db.collection('employees').where('status', '==', 'active').get(),
    db.collection('evaluations').where('cycleId', '==', currentCycle.id).get(),
  ]);

  const employees = empSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const evaluations = evalSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  const avgMap = {};
  evaluations.forEach(ev => {
    if (!avgMap[ev.employeeId]) avgMap[ev.employeeId] = { scores: [], lates: [] };
    avgMap[ev.employeeId].scores.push(ev.totalScore);
    avgMap[ev.employeeId].lates.push(ev.lateCount || 0);
  });

  const data = employees.map(emp => {
    const info = avgMap[emp.id];
    const avg = info ? Math.round(info.scores.reduce((a, b) => a + b, 0) / info.scores.length) : null;
    const late = info ? Math.max(...info.lates) : 0;
    return { emp, avg, late, count: info ? info.scores.length : 0 };
  });

  const evaluated = data.filter(d => d.count > 0).length;
  const berlinda = data.filter(d => d.avg !== null && d.avg < 50).length;

  document.getElementById('pageContent').innerHTML = `
    <div class="stat-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Com Avaliações</div><div class="stat-value" style="color:var(--green)">${evaluated}</div></div>
      <div class="stat-card"><div class="stat-label">Sem Avaliação</div><div class="stat-value" style="color:var(--yellow)">${employees.length - evaluated}</div></div>
      <div class="stat-card"><div class="stat-label">Em Berlinda</div><div class="stat-value" style="color:var(--red)">${berlinda}</div></div>
      <div class="stat-card">
        <div class="stat-label">Progresso</div>
        <div style="margin-top:8px"><div class="progress-bar"><div class="progress-fill" style="width:${employees.length ? evaluated/employees.length*100 : 0}%;background:var(--green)"></div></div></div>
        <div class="stat-sub" style="margin-top:6px">${employees.length ? Math.round(evaluated/employees.length*100) : 0}% avaliados</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Avaliações por Colaborador</div>
        <button class="btn btn-primary btn-sm" onclick="navigate('avaliar')"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova Avaliação</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Colaborador</th><th>Nível</th><th>Avaliações</th><th>Média</th><th>Atrasos</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${data.map(({ emp, avg, late, count }) => {
              const s = getScoreLabel(avg, late);
              return `<tr>
                <td><strong>${emp.name}</strong></td>
                <td><div class="level-badge level-${emp.level}">${emp.level}</div></td>
                <td><span class="badge badge-gray">${count}</span></td>
                <td><span style="font-size:18px;font-weight:700;color:${avg !== null ? getScoreColor(avg) : 'var(--text-muted)'}">${avg !== null ? avg : '–'}</span></td>
                <td><span class="${late >= 3 ? 'badge badge-red' : ''}">${late}</span></td>
                <td><span class="badge" style="background:${s.color}20;color:${s.color}">${s.label}</span></td>
                <td><button class="btn btn-ghost btn-sm" onclick="navigate('avaliar')">Avaliar</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

  ]);
  const employees = empSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const evaluations = evalSnap.docs.map(d => d.data());

  const avgMap = {};
  evaluations.forEach(ev => {
    if (!avgMap[ev.employeeId]) avgMap[ev.employeeId] = { scores: [], lates: [], p: [], o: [], pr: [], q: [], s: [] };
    const m = avgMap[ev.employeeId];
    m.scores.push(ev.totalScore);

          <div class="card-subtitle">Ordenado por média de pontuação</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Colaborador</th><th>Nível</th><th>Pont.</th><th>Org.</th><th>Prod.</th><th>Qual.</th><th>Seg.</th><th>Média</th><th>Atrasos</th><th>Status</th></tr></thead>
          <tbody>
            ${data.map(({ emp, score, late, count, p, o, pr, q, s }, i) => {
              const status = getScoreLabel(score, late);
              const medal = i === 0 ? '' : i === 1 ? '' : i === 2 ? '' : `${i + 1}`;
              return `<tr>
                <td style="font-weight:700;font-size:16px">${medal}</td>
                <td><strong>${emp.name}</strong></td>
                <td><div class="level-badge level-${emp.level}">${emp.level}</div></td>
                <td>${p ?? '–'}</td><td>${o ?? '–'}</td><td>${pr ?? '–'}</td><td>${q ?? '–'}</td><td>${s ?? '–'}</td>
                <td style="font-size:20px;font-weight:800;color:${score !== null ? getScoreColor(score) : 'var(--text-muted)'}">${score ?? '–'}</td>
                <td>${late}</td>

async function salvarColaborador(id) {
  const name = document.getElementById('mNome').value.trim();
  if (!name) { showToast('Nome é obrigatório.', 'error'); return; }
  const data = {
    name,
    position: document.getElementById('mCargo').value.trim(),
    level: document.getElementById('mLevel').value,
    baseSalary: Math.round((parseFloat(document.getElementById('mSalario').value) || 0) * 100),
    cpf: document.getElementById('mCpf').value.trim(),
    status: 'active',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  try {
    if (id) await db.collection('employees').doc(id).update(data);
    else { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); await db.collection('employees').add(data); }
    closeModal();
    showToast(id ? 'Colaborador atualizado!' : 'Colaborador criado!');
    renderColaboradores();
  } catch (e) { showToast('Erro ao salvar.', 'error'); }
}

async function editColaborador(id) {

  openModalColaborador({ id, ...doc.data() });
}

async function inativarColaborador(id, name) {

  await db.collection('employees').doc(id).update({ status: 'inactive' });
  showToast('Colaborador inativado.');
  renderColaboradores();
}

// FATURAMENTO
// ============================================================
async function renderFaturamento() {
  const [revSnap, flagSnap] = await Promise.all([
    db.collection('revenues').where('cycleId', '==', currentCycle.id).get(),
    db.collection('flags').get(),
  ]);
  const revenues = revSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const flags = flagSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(f => f.isActive !== false).sort((a, b) => a.level - b.level);
  const total = revenues.reduce((s, r) => s + (r.amount || 0), 0);
  const currentFlag = flags.filter(f => f.minRevenue <= total).sort((a, b) => b.minRevenue - a.minRevenue)[0];
  const nextFlag = flags.filter(f => f.minRevenue > total).sort((a, b) => a.minRevenue - b.minRevenue)[0];

  document.getElementById('pageContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start">
      <div>
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title"> Faturamento — ${getMonthName(currentCycle.month)}/${currentCycle.year}</div>
              <div class="card-subtitle">${revenues.length} lançamento(s)</div>
            </div>
            <button class="btn btn-primary" onclick="openModalFaturamento()">+ Lançar</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Data</th><th>Obra/Projeto</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>
              <tbody>
                ${revenues.length === 0
                  ? `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px">Nenhum lançamento ainda.</td></tr>`
                  : revenues.map(r => `<tr>
                    <td>${r.revenueDate || '–'}</td>
                    <td><strong>${r.projectName || '–'}</strong></td>
                    <td style="color:var(--text-muted)">${r.description || '–'}</td>
                    <td style="font-weight:600;color:var(--green)">${formatCurrency(r.amount)}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="excluirFaturamento('${r.id}')">Excluir</button></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Resumo do Mês</div>
        <div style="font-size:12px;color:var(--text-muted)">Total faturado</div>
        <div style="font-size:28px;font-weight:800;margin-bottom:16px">${formatCurrency(total)}</div>
        ${currentFlag
          ? `<div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:8px">
              <div class="flag-circle flag-${currentFlag.level}" style="width:36px;height:36px;font-size:14px">${currentFlag.level}</div>
              <div><div style="font-weight:600">Bandeira ${currentFlag.level}</div><div style="font-size:12px;color:var(--text-muted)">${currentFlag.bonusPercentage}% premiação</div></div>
            </div>`
          : `<div style="padding:12px;background:var(--surface2);border-radius:8px;color:var(--text-muted);font-size:13px">Nenhuma bandeira atingida</div>`}
        ${nextFlag ? `<div style="font-size:12px;color:var(--yellow);margin-top:8px">Faltam ${formatCurrency(nextFlag.minRevenue - total)} para Bandeira ${nextFlag.level}</div>` : ''}
        <div style="margin-top:16px">
          ${flags.map(f => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
              <span style="color:var(--text-muted)">Bandeira ${f.level}</span>
              <span>${formatCurrency(f.minRevenue)} · ${f.bonusPercentage}%</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function openModalFaturamento() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('modalTitle').textContent = 'Novo Lançamento';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label class="form-label">Valor (R$) *</label>
      <input class="form-control" id="rValor" type="number" step="0.01" placeholder="0,00"></div>
    <div class="form-group"><label class="form-label">Data *</label>
      <input class="form-control" id="rData" type="date" value="${today}"></div>
    <div class="form-group"><label class="form-label">Obra / Projeto</label>
      <input class="form-control" id="rObra" placeholder="Ex: Obra Rua das Flores"></div>
    <div class="form-group"><label class="form-label">Descrição</label>
      <textarea class="form-control" id="rDesc" placeholder="Detalhes adicionais..."></textarea></div>
  `;
  document.getElementById('modalFooter').innerHTML = `

    <button class="btn btn-primary" onclick="salvarFaturamento()">Salvar</button>

async function salvarFaturamento() {
  const valor = parseFloat(document.getElementById('rValor').value);
  const data = document.getElementById('rData').value;
  if (!valor || !data) { showToast('Valor e data são obrigatórios.', 'error'); return; }
  try {
    await db.collection('revenues').add({
      cycleId: currentCycle.id, createdBy: currentUser.uid,
      amount: Math.round(valor * 100),
      revenueDate: data,
      projectName: document.getElementById('rObra').value.trim(),
      description: document.getElementById('rDesc').value.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    closeModal(); showToast('Lançamento salvo!'); renderFaturamento();
  } catch (e) { showToast('Erro ao salvar.', 'error'); }
}

async function excluirFaturamento(id) {
  if (!confirm('Excluir este lançamento?')) return;
  await db.collection('revenues').doc(id).delete();
  showToast('Lançamento excluído.');
  renderFaturamento();
}

async function renderCiclos() {
  const snap = await db.collection('cycles').get();
  const cycles = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.year - a.year || b.month - a.month);

  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title"> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Histórico de Ciclos</div>
        ${currentCycle?.status === 'active'
          ? `<button class="btn btn-danger" onclick="encerrarCiclo()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Encerrar Ciclo Atual</button>`
          : ''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Período</th><th>Status</th><th>Faturamento</th><th>Bandeira</th><th>Encerrado em</th></tr></thead>
          <tbody>
            ${cycles.map(c => `<tr>
              <td><strong>${getMonthName(c.month)}/${c.year}</strong></td>
              <td><span class="badge ${c.status === 'active' ? 'badge-green' : 'badge-gray'}">${c.status === 'active' ? 'Ativo' : 'Encerrado'}</span></td>
              <td>${c.totalRevenue ? formatCurrency(c.totalRevenue) : '–'}</td>
              <td>${c.flagLevel ? `<span class="badge badge-blue">Bandeira ${c.flagLevel} · ${c.flagPercentage}%</span>` : '–'}</td>
              <td style="color:var(--text-muted)">${c.closedAt ? formatDate(c.closedAt) : '–'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function encerrarCiclo() {
  if (!confirm('Encerrar o ciclo atual? Esta ação não pode ser desfeita.')) return;
  try {
    const revSnap = await db.collection('revenues').where('cycleId', '==', currentCycle.id).get();
    const total = revSnap.docs.reduce((s, d) => s + (d.data().amount || 0), 0);
    const flagSnap = await db.collection('flags').get();
    const flag = flagSnap.docs.map(d => d.data()).filter(f => f.isActive !== false).sort((a,b) => b.minRevenue - a.minRevenue).find(f => f.minRevenue <= total);
    await db.collection('cycles').doc(currentCycle.id).update({
      status: 'closed', totalRevenue: total,
      flagLevel: flag?.level || 0, flagPercentage: flag?.bonusPercentage || 0,
      closedAt: firebase.firestore.FieldValue.serverTimestamp(), closedBy: currentUser.uid,
    });
    showToast('Ciclo encerrado!');
    currentCycle = { ...currentCycle, status: 'closed' };
    renderCiclos();
  } catch (e) { showToast('Erro ao encerrar ciclo.', 'error'); }
}

// CRIAR NOVO USUÁRIO (via Firebase Auth REST API)
// ============================================================
function openModalNovoUsuario() {
  document.getElementById('modalTitle').textContent = 'Novo Usuário';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group">
      <label class="form-label">Nome completo *</label>
      <input class="form-control" id="nuNome" placeholder="Nome do usuário">
    </div>
    <div class="form-group">
      <label class="form-label">E-mail *</label>
      <input class="form-control" id="nuEmail" type="email" placeholder="email@empresa.com">
    </div>
    <div class="form-group">
      <label class="form-label">Senha *</label>
      <input class="form-control" id="nuSenha" type="password" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-control" id="nuRole">
        <option value="employee">Colaborador</option>
        <option value="captain">Capitão</option>
        <option value="leader">Líder</option>
        <option value="admin">Administrador</option>
      </select>
    </div>
    <div id="nuError" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
  `;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" id="btnCriarUser" onclick="criarUsuario()">Criar Usuário</button>
  `;
  openModal();
}

async function criarUsuario() {
  const nome = document.getElementById('nuNome').value.trim();
  const email = document.getElementById('nuEmail').value.trim();
  const senha = document.getElementById('nuSenha').value;
  const role = document.getElementById('nuRole').value;
  const errEl = document.getElementById('nuError');

  if (!nome || !email || !senha) {
    errEl.textContent = 'Preencha todos os campos obrigatórios.';
    errEl.style.display = 'block';
    return;
  }
  if (senha.length < 6) {
    errEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('btnCriarUser').disabled = true;
  document.getElementById('btnCriarUser').textContent = 'Criando...';
  errEl.style.display = 'none';

  try {
    // Criar usuário via Firebase Auth REST API
    const apiKey = firebaseConfig.apiKey;
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: senha, returnSecureToken: true })
    });
    const data = await res.json();

    if (data.error) {
      const msgs = {
        'EMAIL_EXISTS': 'Este e-mail já está cadastrado.',
        'INVALID_EMAIL': 'E-mail inválido.',
        'WEAK_PASSWORD : Password should be at least 6 characters': 'Senha muito fraca (mínimo 6 caracteres).',
      };
      throw new Error(msgs[data.error.message] || data.error.message);
    }

    const uid = data.localId;

    // Atualizar displayName via REST API
    await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken: data.idToken, displayName: nome })
    });

    // Criar documento no Firestore
    await db.collection('users').doc(uid).set({
      name: nome,
      email,
      role,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    closeModal();
    showToast(`Usuário ${nome} criado com sucesso!`);
    renderUsuarios();

  } catch (err) {
    errEl.textContent = err.message || 'Erro ao criar usuário.';
    errEl.style.display = 'block';
    document.getElementById('btnCriarUser').disabled = false;
    document.getElementById('btnCriarUser').textContent = 'Criar Usuário';
  }
}

async function alterarRole(userId, role) {
  await db.collection('users').doc(userId).update({ role });
  showToast('Role atualizado!');
}

async function vincularEmployee(userId, employeeId) {
  // desvincula o anterior
  const prev = await db.collection('employees').where('userId', '==', userId).get();
  for (const doc of prev.docs) await doc.ref.update({ userId: null });
  if (employeeId) await db.collection('employees').doc(employeeId).update({ userId });
  showToast('Vínculo atualizado!');
}

async function renderConfiguracoes() {
  const snap = await db.collection('flags').orderBy('level').get();
  const flags = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  document.getElementById('pageContent').innerHTML = `
    <div class="card" style="max-width:600px">
      <div class="card-header">
        <div><div class="card-title"> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> Configuração de Bandeiras</div>
          <div class="card-subtitle">Metas de faturamento e % de premiação</div></div>
        <button class="btn btn-primary" onclick="openModalBandeira()">+ Nova</button>
      </div>
      <div id="flagsList">
        ${flags.length === 0
          ? `<div class="empty-state"><div class="empty-icon"></div><div class="empty-text">Nenhuma bandeira configurada.<br>
             <button class="btn btn-primary" style="margin-top:12px" onclick="seedBandeiras()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> Criar Bandeiras Padrão</button></div></div>`
          : flags.map(f => `
            <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
              <div class="flag-circle flag-${f.level}" style="width:40px;height:40px;font-size:14px;flex-shrink:0">${f.level}</div>
              <div style="flex:1">
                <div style="font-weight:600">Bandeira ${f.level}</div>
                <div style="font-size:12px;color:var(--text-muted)">A partir de ${formatCurrency(f.minRevenue)} · ${f.bonusPercentage}% de premiação</div>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="editBandeira('${f.id}')">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="deleteBandeira('${f.id}')">Excluir</button>
            </div>`).join('')}
      </div>
    </div>
  `;
}

function openModalBandeira(flag = null) {
  document.getElementById('modalTitle').textContent = flag ? 'Editar Bandeira' : 'Nova Bandeira';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nível *</label>
        <input class="form-control" id="fLevel" type="number" min="1" max="10" value="${flag?.level || ''}"></div>
      <div class="form-group"><label class="form-label">% Premiação *</label>
        <input class="form-control" id="fBonus" type="number" min="0" max="100" value="${flag?.bonusPercentage || ''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Faturamento mínimo (R$) *</label>
      <input class="form-control" id="fMin" type="number" step="0.01" value="${flag ? flag.minRevenue / 100 : ''}"></div>
  `;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarBandeira('${flag?.id || ''}')">Salvar</button>
  `;
  openModal();
}

async function salvarBandeira(id) {
  const level = parseInt(document.getElementById('fLevel').value);
  const bonus = parseInt(document.getElementById('fBonus').value);
  const min = Math.round(parseFloat(document.getElementById('fMin').value) * 100);
  if (!level || !bonus || !min) { showToast('Preencha todos os campos.', 'error'); return; }
  const data = { level, bonusPercentage: bonus, minRevenue: min, isActive: true };
  try {
    if (id) await db.collection('flags').doc(id).update(data);
    else { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); await db.collection('flags').add(data); }
    closeModal(); showToast('Bandeira salva!'); renderConfiguracoes();
  } catch (e) { showToast('Erro ao salvar.', 'error'); }
}

async function editBandeira(id) {
  const doc = await db.collection('flags').doc(id).get();
  openModalBandeira({ id, ...doc.data() });
}

async function deleteBandeira(id) {
  if (!confirm('Excluir esta bandeira?')) return;
  await db.collection('flags').doc(id).delete();
  showToast('Bandeira excluída.'); renderConfiguracoes();
}

async function seedBandeiras() {
  const defaults = [
    { level: 1, minRevenue: 5000000, bonusPercentage: 15 },
    { level: 2, minRevenue: 8000000, bonusPercentage: 30 },
    { level: 3, minRevenue: 11000000, bonusPercentage: 45 },
    { level: 4, minRevenue: 15000000, bonusPercentage: 60 },
    { level: 5, minRevenue: 20000000, bonusPercentage: 75 },
  ];
  for (const f of defaults) {
    await db.collection('flags').add({ ...f, isActive: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  }
  showToast('Bandeiras padrão criadas!'); renderConfiguracoes();
}

// Ajustar footer no mobile
function adjustFooter() {
  const footer = document.getElementById('appFooter');
  if (!footer) return;
  if (window.innerWidth <= 768) {
    footer.style.left = '0';
    footer.style.padding = '8px 16px';
  } else {
    footer.style.left = '240px';
    footer.style.padding = '10px 28px';
  }
}
window.addEventListener('resize', adjustFooter);
document.addEventListener('DOMContentLoaded', adjustFooter);
setTimeout(adjustFooter, 100);
